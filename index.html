<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Seseorang mengirimimu pesan...</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Container Utama */
        .phone-stage {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            position: relative;
            background-color: #000000;
            border-left: 1px solid #262626;
            border-right: 1px solid #262626;
        }

        /* ================= LAYER 1: LOCK SCREEN ================= */
        .lock-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.6)), 
                        url('https://images.unsplash.com/photo-1518531933037-91b2f5f229cc?w=500') no-repeat center center;
            background-size: cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 60px 20px 5px 20px;
            z-index: 20;
            transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.5s;
        }

        .time-area {
            text-align: center;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .time-area h1 { font-size: 3.5rem; font-weight: 300; margin-bottom: 5px; }
        .time-area p { font-size: 1.1rem; opacity: 0.9; font-weight: 400; }

        /* Notifikasi Instagram Pop-up */
        .notification-center {
            width: 100%;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 10px;
        }

        .notif-box {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            width: 100%;
            padding: 15px;
            border-radius: 22px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            animation: pulseNotif 2s infinite ease-in-out;
        }

        @keyframes pulseNotif {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .notif-icon {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            object-fit: cover;
            border: 1.5px solid #fff;
        }

        .notif-content { flex-grow: 1; color: #ffffff; }
        .notif-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
        .notif-title { font-weight: 600; font-size: 14px; }
        .notif-app { font-size: 11px; opacity: 0.7; }
        .notif-body { font-size: 13.5px; line-height: 1.3; opacity: 0.95; font-weight: 500; }

        .hint-text {
            font-size: 13px;
            opacity: 0.7;
            margin-bottom: 30px;
            text-shadow: 0 1px 5px rgba(0,0,0,0.5);
            animation: bounceText 1.5s infinite;
        }

        @keyframes bounceText {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        /* ================= LAYER 2: INSTAGRAM DM ================= */
        .chat-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background-color: #000000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        /* Active State Layar */
        .phone-stage.unlock .lock-screen {
            transform: translateY(-100%);
            opacity: 0;
            pointer-events: none;
        }

        .phone-stage.unlock .chat-container {
            opacity: 1;
            pointer-events: auto;
        }

        /* Bagian Atas DM */
        .chat-header {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            border-bottom: 1px solid #262626;
            background-color: #000000;
        }

        .back-icon { font-size: 24px; margin-right: 15px; }
        
        .profile-pic {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: #333;
            margin-right: 12px;
            object-fit: cover;
        }

        .user-info { flex-grow: 1; }
        .user-info .name { font-weight: 600; font-size: 14px; }
        .user-info .status { font-size: 12px; color: #a8a8a8; transition: color 0.3s; }
        .user-info .status.typing-active { color: #0095f6; font-weight: 500; }

        /* Area Pesan */
        .chat-messages {
            flex-grow: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .message-bubble {
            max-width: 80%;
            align-self: flex-start;
            display: flex;
            flex-direction: column;
            animation: popIn 0.3s ease forwards;
        }

        @keyframes popIn {
            from { opacity: 0; transform: translateY(10px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .message-text {
            background-color: #262626;
            color: #f5f5f5;
            padding: 11px 15px;
            font-size: 14px;
            line-height: 1.4;
            border-radius: 4px 18px 18px 4px;
        }

        .first-msg .message-text { border-radius: 18px 18px 18px 4px; }
        .last-msg .message-text { border-radius: 4px 18px 18px 18px; }

        .timestamp {
            font-size: 11px;
            color: #a8a8a8;
            margin-left: 4px;
            margin-top: 3px;
            margin-bottom: 8px;
        }

        /* Footer & Tombol Balas */
        .chat-footer {
            padding: 16px;
            background-color: #000000;
            border-top: 1px solid #262626;
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }

        .chat-footer.show {
            opacity: 1;
            pointer-events: auto;
        }

        .reply-btn {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 14px;
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            color: #ffffff;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 600;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="phone-stage" id="phoneStage">
        
        <!-- ================= LAYER 1: LAYAR KUNCI ================= -->
        <div class="lock-screen" id="lockScreen">
            <div class="time-area">
                <h1 id="clock">14:46</h1>
                <p id="date">Rabu, 1 Juli</p>
            </div>

            <div class="notification-center">
                <!-- Notifikasi Yang Bisa Diklik -->
                <div class="notif-box" onclick="unlockAndOpenChat()">
                    <img src="https://i.postimg.cc/grQ73BYX/IMG-20260630-080105-522.jpg" class="notif-icon" alt="Hafiz">
                    <div class="notif-content">
                        <div class="notif-header">
                            <span class="notif-title">mas_fizzz.bjir</span>
                            <span class="notif-app">Instagram • sekarang</span>
                        </div>
                        <div class="notif-body">Mengirimkan pesan: "Nova, aku mau pamit ya..."</div>
                    </div>
                </div>
            </div>

            <div class="hint-text">TAP NOTIFIKASI UNTUK MEMBUKA 🔓</div>
        </div>

        <!-- ================= LAYER 2: INSTAGRAM DM ================= -->
        <div class="chat-container">
            <div class="chat-header">
                <span class="back-icon">←</span>
                <img src="https://i.postimg.cc/grQ73BYX/IMG-20260630-080105-522.jpg" class="profile-pic" alt="Hafiz">
                <div class="user-info">
                    <div class="name">Hafiz Ahmad Nurrudin</div>
                    <div class="status" id="chatStatus">Aktif sekian menit yang lalu</div>
                </div>
            </div>

            <div class="chat-messages" id="chatArea"></div>

            <div class="chat-footer" id="chatFooter">
                <a href="https://ig.me/m/mas_fizzz.bjir" target="_blank" class="reply-btn">
                    Balas di DM Instagram Asli 💬
                </a>
            </div>
        </div>

    </div>

    <script>
        const phoneStage = document.getElementById('phoneStage');
        const statusText = document.getElementById('chatStatus');
        const chatArea = document.getElementById('chatArea');
        const chatFooter = document.getElementById('chatFooter');

        // Pesan per kalimat + Emoji
        const messages = [
            { text: "Nova, aku mau pamit ya karena sebentar lagi aku harus balik ke pondok. 🎒🙏", type: "first-msg" },
            { text: "Nanti di sana aku bakal susah buat dihubungin, tapi makasih banyak ya buat semua waktu dan hal yang udah kita lewatin bareng. ✨💫", type: "mid-msg" },
            { text: "Meskipun hubungan kita sebatas teman, tolong jangan lupain aku apalagi sampai jadi orang asing ya. 🥺🌱", type: "mid-msg" },
            { text: "Kalau ada waktu luang nanti pasti aku chat kok. Jaga kesehatan dan jaga diri kamu baik-baik ya di sini! 👋🌸", type: "last-msg" }
        ];

        let currentIndex = 0;

        // 1. Fungsi transisi saat Notifikasi di Lock Screen diklik
        function unlockAndOpenChat() {
            phoneStage.classList.add('unlock');
            // Beri jeda 1 detik setelah transisi buka layar kunci selesai sebelum mulai simulasi typing
            setTimeout(startTypingSimulation, 1000);
        }

        // 2. Fungsi Simulasi Chat Berurutan
        function startTypingSimulation() {
            if (currentIndex >= messages.length) {
                statusText.innerText = "Aktif sekarang";
                statusText.classList.remove('typing-active');
                chatFooter.classList.add('show');
                return;
            }

            statusText.innerText = "sedang mengetik...";
            statusText.classList.add('typing-active');

            const typingTime = messages[currentIndex].text.length * 30;

            setTimeout(() => {
                statusText.innerText = "Aktif sekarang";
                statusText.classList.remove('typing-active');

                const bubble = document.createElement('div');
                bubble.className = `message-bubble ${messages[currentIndex].type}`;
                
                let timestampHTML = '';
                if (currentIndex === messages.length - 1) {
                    timestampHTML = `<div class="timestamp">Baru saja dikirim</div>`;
                }

                bubble.innerHTML = `
                    <div class="message-text">${messages[currentIndex].text}</div>
                    ${timestampHTML}
                `;

                chatArea.appendChild(bubble);
                chatArea.scrollTop = chatArea.scrollHeight;

                currentIndex++;
                
                setTimeout(startTypingSimulation, 1500);

            }, typingTime);
        }

        // Update Waktu Jam Otomatis di Lock Screen sesuai real-time HP Nova
        function updateClock() {
            const now = new Date();
            let hours = now.getHours().toString().padStart(2, '0');
            let minutes = now.getMinutes().toString().padStart(2, '0');
            document.getElementById('clock').innerText = `${hours}:${minutes}`;

            const options = { weekday: 'long', day: 'numeric', month: 'long' };
            document.getElementById('date').innerText = now.toLocaleDateString('id-ID', options);
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
